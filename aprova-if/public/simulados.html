<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Simulados - Aprova IF</title>

    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">

    <link rel="stylesheet" href="/css/components/header.css">
    <link rel="stylesheet" href="/css/components/buttons.css">
    <link rel="stylesheet" href="/css/components/cards.css">

    <link rel="stylesheet" href="/css/pages/simulados.css">

</head>

<body>

<header class="header">

    <div class="container header-container">

        <div class="logo">

            <div class="logo-square">
                A
            </div>

            <div>

                <h2>Aprova IF</h2>

                <span>
                    Instituto Federal Catarinense
                </span>

            </div>

        </div>

        <nav class="navbar">

            <a href="/">Início</a>

            <a href="#">
                Estatisticas
            </a>

            <a href="/ranking">
                Ranking
            </a>

        </nav>

    </div>

</header>

<main>

<section class="page-hero">

    <div class="container">

        <span class="badge">
            Banco de Provas
        </span>

        <h1>
            Escolha um Simulado
        </h1>

        <p>
            Resolva provas oficiais do IFC ou monte seu próprio desafio.
        </p>

    </div>

</section>

<section class="years-section">

    <div class="container">

        <div class="section-header">

            <h2>
                Provas Oficiais IFC
            </h2>

        </div>

        <div class="years-grid">

            <a href="#" class="year-card">2025</a>
            <a href="#" class="year-card">2024</a>
            <a href="#" class="year-card">2023</a>
            <a href="#" class="year-card">2022</a>

            <a href="#" class="year-card">2021</a>
            <a href="#" class="year-card">2020</a>
            <a href="#" class="year-card">2019</a>
            <a href="#" class="year-card">2018</a>

            <a href="#" class="year-card">2017</a>
            <a href="#" class="year-card">2016</a>
            <a href="#" class="year-card">2015</a>
            <a href="#" class="year-card">2014</a>

            <a href="#" class="year-card">2013</a>
            <a href="#" class="year-card">2012</a>

        </div>

    </div>

</section>

<section class="custom-section">

    <div class="container">

        <div class="custom-card">

            <h2>
                Criar Simulado Personalizado
            </h2>

            <div class="subjects-grid">

                <label>
                    <input type="checkbox">
                    Matemática
                </label>

                <label>
                    <input type="checkbox">
                    Português
                </label>

                <label>
                    <input type="checkbox">
                    História
                </label>

                <label>
                    <input type="checkbox">
                    Geografia
                </label>

                <label>
                    <input type="checkbox">
                    Ciências
                </label>

            </div>

            <div class="form-row">

                <div>

                    <label>
                        Quantidade de Questões
                    </label>

                    <select>

                        <option>10</option>
                        <option>20</option>
                        <option>30</option>
                        <option>40</option>

                    </select>

                </div>

                <div>

                    <label>
                        Dificuldade
                    </label>

                    <select>

                        <option>Fácil</option>
                        <option>Média</option>
                        <option>Difícil</option>

                    </select>

                </div>

            </div>

            <button class="btn btn-primary">
                Gerar Simulado
            </button>

        </div>

    </div>

</section>

</main>

</body>
</html>
